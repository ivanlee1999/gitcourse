name: Build and Push to DockerHub

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ivanlee1999/gh-actions-dashboard

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Slack notification
        if: always()
        shell: bash
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ "${{ job.status }}" = "success" ]; then
            STATUS_TEXT="SUCCEEDED :white_check_mark: - Image pushed to DockerHub"
          else
            STATUS_TEXT="FAILED :red_circle: - Build failed"
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST \
            -H 'Content-type: application/json' \
            -d "{\"username\":\"github-actions\",\"icon_emoji\":\":github:\",\"text\":\"*${{ github.workflow }}/${{ github.job }}* (#${{ github.run_number }}) ${STATUS_TEXT}\\n${RUN_URL}\"}" \
            "$SLACK_WEBHOOK_URL" || true
